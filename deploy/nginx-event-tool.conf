## Event Tool (клієнтський фронт) — порт 80
## ─── ОДИН бекенд RH на 127.0.0.1:8001 — обслуговує і клієнтів, і адмінів ───
## Файл: /etc/nginx/sites-available/event-tool

server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 100M;

    # Спільні uploads (картинки товарів)
    location /uploads/ {
        alias /var/www/farforrent/backend/uploads/;
        expires 30d;
        access_log off;
    }

    # Static-шлях для мігрованих фото з OpenCart (9000+ позицій)
    location /static/ {
        alias /var/www/farforrent/backend/static/;
        expires 30d;
        access_log off;
        # fallback на бекенд якщо файла фізично немає (на випадок lazy generated)
        try_files $uri @backend_static;
    }
    location @backend_static {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
    }

    # API — проксі на ЄДИНИЙ RH backend
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }

    # FastAPI docs (зручно для тебе під час розробки)
    location ~ ^/(docs|openapi.json|redoc) {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
    }

    # Статика Event Tool React
    root /var/www/event-tool-build;
    index index.html;

    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
