## Event Tool (клієнтський фронт) — порт 80
## ─── ОДИН бекенд RH на 127.0.0.1:8001 ───
## Файл: /etc/nginx/sites-available/event-tool

server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 100M;

    # Картинки товарів — фізично лежать у /var/www/farforrent/backend/uploads/products/
    location /uploads/ {
        alias /var/www/farforrent/backend/uploads/;
        expires 30d;
        access_log off;
    }

    # /static/ — на випадок якщо бекенд віддає шляхи через нього
    location /static/ {
        proxy_pass http://127.0.0.1:8001;
        expires 7d;
        access_log off;
    }

    # API → ЄДИНИЙ RH backend
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }

    location ~ ^/(docs|openapi.json|redoc) {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
    }

    # Статика Event Tool React
    root /var/www/event-tool-build;
    index index.html;

    location /static/js/ {
        alias /var/www/event-tool-build/static/js/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    location /static/css/ {
        alias /var/www/event-tool-build/static/css/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    location /static/media/ {
        alias /var/www/event-tool-build/static/media/;
        expires 1y;
        access_log off;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
