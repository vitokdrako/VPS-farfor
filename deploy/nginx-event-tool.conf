## Event Tool (клієнтський фронт) — порт 80
## Файл: /etc/nginx/sites-available/event-tool

server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 100M;

    # Спільні uploads (картинки товарів)
    location /uploads/ {
        alias /var/www/farforrent/backend/uploads/;
        expires 30d;
        access_log off;
    }

    # Event Tool API → порт 8002
    location /api/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # Статика Event Tool
    root /var/www/event-tool-build;
    index index.html;

    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
