## RentalHub адмінка — порт 8080
## Файл: /etc/nginx/sites-available/rentalhub-admin

server {
    listen 8080;
    server_name _;
    client_max_body_size 100M;

    # Спільні uploads (та сама папка що й Event Tool)
    location /uploads/ {
        alias /var/www/farforrent/backend/uploads/;
        expires 30d;
        access_log off;
    }

    # RentalHub API → порт 8001
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }

    # FastAPI docs
    location ~ ^/(docs|openapi.json|redoc) {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
    }

    # Статика RentalHub
    root /var/www/farforrent/frontend/build;
    index index.html;

    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
