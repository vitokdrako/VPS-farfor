## RentalHub адмінка — порт 8080 (БЕЗ default_server!)
## Файл: /etc/nginx/sites-available/rentalhub-admin

server {
    listen 8080;
    server_name _;
    client_max_body_size 100M;

    location /uploads/ {
        alias /var/www/farforrent/backend/uploads/;
        expires 30d;
        access_log off;
    }

    # API → ЄДИНИЙ RH backend
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }

    location ~ ^/(docs|openapi.json|redoc) {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
    }

    # ВАЖЛИВО: RH адмінка зібрана з PUBLIC_URL=/admin, тому статика йде під /admin/...
    # Якщо це не так — перебілди без PUBLIC_URL і поміняй цей блок
    root /var/www/rentalhub-admin-build;
    index index.html;

    location /static/ {
        alias /var/www/rentalhub-admin-build/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /admin/ {
        alias /var/www/rentalhub-admin-build/;
        try_files $uri $uri/ /admin/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
