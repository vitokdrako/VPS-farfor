## Nginx конфіг для VPS — клієнтський Event Tool на "/" + адмінка RentalHub на "/admin"
## Файл: /etc/nginx/sites-available/farforrent
## Активувати: ln -sf /etc/nginx/sites-available/farforrent /etc/nginx/sites-enabled/

server {
    listen 80 default_server;
    server_name 173.242.49.48 _;
    client_max_body_size 100M;

    # ============================================================
    # API #1: RentalHub backend (адмінка) — порт 8001
    # ============================================================
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }

    # ============================================================
    # API #2: Event Tool backend (клієнти) — порт 8002
    # `/event-api/api/auth/me` -> Nginx стрипає `/event-api` -> віддає на :8002 як `/api/auth/me`
    # ============================================================
    location /event-api/ {
        rewrite ^/event-api(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # ============================================================
    # FastAPI docs (RH only)
    # ============================================================
    location ~ ^/(docs|openapi.json|redoc) {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
    }

    # ============================================================
    # Спільні uploads (картинки товарів — і клієнт, і адмін)
    # ============================================================
    location /uploads/ {
        alias /var/www/farforrent/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ============================================================
    # АДМІНКА RentalHub — на /admin/
    # ============================================================
    location /admin {
        alias /var/www/farforrent/frontend/build;
        try_files $uri $uri/ /admin/index.html;
    }

    # ============================================================
    # КЛІЄНТСЬКИЙ Event Tool — корінь "/"
    # Усі шляхи що не співпали вище -> віддаємо Event Tool SPA
    # ============================================================
    root /var/www/event-tool-build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
