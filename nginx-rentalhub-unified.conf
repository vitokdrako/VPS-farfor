## Nginx конфіг для VPS 173.242.49.48
## Event Tool (клієнти) на "/"  +  RentalHub адмінка на "/admin"
##
## Активувати:
##   sudo cp nginx-rentalhub-unified.conf /etc/nginx/sites-available/farforrent
##   sudo ln -sf /etc/nginx/sites-available/farforrent /etc/nginx/sites-enabled/
##   sudo rm -f /etc/nginx/sites-enabled/default
##   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80 default_server;
    server_name 173.242.49.48 _;
    client_max_body_size 100M;

    # ============================================================
    # API RentalHub (для адмінки) — порт 8001
    # ============================================================
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }

    # FastAPI docs RH
    location ~ ^/(docs|openapi.json|redoc) {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
    }

    # ============================================================
    # Спільні uploads (картинки товарів)
    # ============================================================
    location /uploads/ {
        alias /var/www/farforrent/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ============================================================
    # Адмінка RentalHub — /admin/
    # ============================================================
    location /admin {
        alias /var/www/farforrent/frontend/build;
        try_files $uri $uri/ /admin/index.html;
    }

    # ============================================================
    # Клієнтський Event Tool — корінь "/"
    # Готовий білд лежить у /var/www/event-tool-build
    # Він звертається до https://backrentalhub.farforrent.com.ua напряму
    # ============================================================
    root /var/www/event-tool-build;
    index index.html;

    # Кешуємо статичні асети довго
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback — усі інші маршрути віддають index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
